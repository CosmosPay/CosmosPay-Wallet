name: Buildear APK de Android

# Build nativo de Android. Corre a demanda y en tags de versión. Produce un artefacto
# apk DEBUG sin firmar (instalable para pruebas). Para un AAB/APK de release firmado,
# agregá tu keystore como secrets y cambiá assembleDebug -> bundleRelease + firma.
#
# iOS no está acá a propósito: solo se puede buildear en macOS con Xcode. Correlo
# localmente con `npm run cap:ios` (agrega ios/ y abre Xcode) o en un runner macOS.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    name: Ensamblar APK debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Capacitor 8 apunta a JDK 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - run: npm ci

      # El paquete de la plataforma android no es dep de runtime — se instala solo para CI.
      - name: Agregar plataforma Android de Capacitor
        run: |
          npm i -D @capacitor/android@^8
          npm run build
          npx cap add android
          npx cap sync android
        env:
          PUBLIC_COSMOS_DEV_PLATFORM_URL: ${{ vars.PUBLIC_COSMOS_DEV_PLATFORM_URL }}
          PUBLIC_COSMOS_GATEWAY_URL: ${{ vars.PUBLIC_COSMOS_GATEWAY_URL }}
          PUBLIC_COSMOS_GATEWAY_ENTRY: ${{ vars.PUBLIC_COSMOS_GATEWAY_ENTRY }}

      - name: Ensamblar APK debug
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-wallet-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
