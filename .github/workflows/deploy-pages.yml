name: Deploy web (GitHub Pages)

# Despliegue continuo del build web a GitHub Pages.
#
# NOTA SOBRE RUTAS: la app referencia assets en la raíz del dominio (ej. /logo-white.png,
# /favicon.svg) desde React del lado del cliente, así que debe servirse desde la raíz de un
# dominio — un *dominio propio* o un sitio Pages de *usuario/organización* (https://<user>.github.io).
# Un subpath de proyecto (https://<user>.github.io/<repo>/) daría 404 en esos assets.
#
# Las URLs de backend se leen en tiempo de BUILD desde Variables del repositorio (Settings ->
# Secrets and variables -> Actions -> Variables). Dejalas sin definir para publicar solo el
# núcleo de la wallet (Horizon/CoinGecko funcionan; el provisioning/swap de CosmosPay las necesitan).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_COSMOS_DEV_PLATFORM_URL: ${{ vars.PUBLIC_COSMOS_DEV_PLATFORM_URL }}
          PUBLIC_COSMOS_GATEWAY_URL: ${{ vars.PUBLIC_COSMOS_GATEWAY_URL }}
          PUBLIC_COSMOS_GATEWAY_ENTRY: ${{ vars.PUBLIC_COSMOS_GATEWAY_ENTRY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
