name: Integración continua (CI)

# Build + typecheck + tests de navegador en cada push y PR. Produce los dos
# artefactos web listos para deploy (dist/ para web+nativo, extension/ para navegadores MV3).
on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck y build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # astro check = diagnósticos de TypeScript + Astro (deben ser 0 errores)
      - name: Typecheck
        run: npm run check

      # Sitio estático -> dist/ (esto es lo que Capacitor envuelve para nativo, también)
      - name: Buildear web (dist/)
        run: npm run build

      # Post-procesa dist/ en una extensión MV3 descomprimida -> extension/
      - name: Buildear extensión (extension/)
        run: npm run build:ext

      - name: Subir build web (dist/)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

      - name: Subir extensión de navegador (extension/)
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: extension
          if-no-files-found: error

  test:
    name: Tests de navegador (e2e + responsive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Servir dist en segundo plano
        run: |
          npm run serve:dist &
          # esperar hasta que el servidor estático responda (máx ~30s)
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:4321 >/dev/null; do sleep 1; done'

      # Ruta crítica de seguridad: derivación SEP-5, vault AES-GCM, unlock/descifrado.
      - name: Smoke test e2e de la wallet
        run: npm run test:e2e
        env:
          E2E_URL: http://127.0.0.1:4321

      # Adaptación a dispositivos: sin overflow + escalado fluido en teléfono/tablet/escritorio.
      - name: Test de layout responsive
        run: npm run test:responsive
        env:
          E2E_URL: http://127.0.0.1:4321
