name: Publicar extensión (.zip)

# Releases empaquetados de la extensión, con versionado automático.
#
# En cada push a main/dev esto:
#   1. Lee los commits del push y elige el salto de versión (Conventional Commits:
#      feat -> minor, fix/otros -> patch, `!:` o `BREAKING CHANGE` -> major).
#   2. Sube la versión (package.json es la única fuente de verdad; build-extension.ts
#      la copia al manifest).
#        - main: versión estable X.Y.Z, commiteada de vuelta al repo + tag.
#        - dev:  prerelease X.Y.Z-dev.<run_number> (NO se commitea — es efímera).
#   3. Buildea las extensiones MV3 de Chrome y de Firefox.
#   4. Empaqueta cada una en un .zip (manifest en la raíz del zip, listo para cargar/subir).
#   5. Publica un GitHub Release con los .zip adjuntos, para que los testers solo
#      descarguen el paquete y lo carguen — sin build de su lado.
#
# El commit de versión en main lleva `[skip ci]`, que GitHub respeta para evitar un
# loop infinito de releases.
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

# Encola los runs de la misma rama (NO cancelar): cada push debe producir su propia
# versión + release, y cancelar a mitad del push/tag podría dejar un release parcial.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # commitear el bump (main), pushear tags, crear releases

jobs:
  release:
    name: Versionar, empaquetar y publicar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo: necesario para diffear el rango de commits del push

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ---- 1. Decidir el salto de versión a partir de los mensajes de commit ----
      - name: Determinar salto de versión
        id: bump
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # Primer push a una rama / dispatch manual / historial reescrito: el SHA
          # `before` falta o es inalcanzable, así que solo miramos HEAD.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            MSGS="$(git log -1 --format=%B "$AFTER")"
          else
            MSGS="$(git log --format=%B "${BEFORE}..${AFTER}")"
          fi
          echo "Analizando commits:"; echo "$MSGS"
          if echo "$MSGS" | grep -qE '(^|[[:space:]])BREAKING CHANGE|^[a-z]+(\(.+\))?!:'; then
            BUMP=major
          elif echo "$MSGS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "Salto elegido: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      # ---- 2. Calcular la nueva versión (escribe package.json en el workspace) ----
      - name: Calcular versión
        id: ver
        run: |
          # Sube el núcleo numérico (primero quita cualquier sufijo de prerelease para
          # que una versión dev previa no se filtre a un bump estable).
          npm version --no-git-tag-version --allow-same-version "$(node -p "require('./package.json').version.split('-')[0]")" >/dev/null
          npm version --no-git-tag-version "${{ steps.bump.outputs.bump }}" >/dev/null
          CORE="$(node -p "require('./package.json').version")"
          if [ "${{ github.ref_name }}" = "dev" ]; then
            VERSION="${CORE}-dev.${{ github.run_number }}"
            npm pkg set "version=${VERSION}" >/dev/null   # solo en el workspace, no se commitea
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="$CORE"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Versión: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ---- 3. Buildear web + ambas extensiones (la versión del manifest sale de package.json) ----
      - name: Buildear web (dist/)
        run: npm run build

      - name: Buildear extensión de Chrome (extension/)
        run: node --disable-warning=ExperimentalWarning --experimental-strip-types scripts/build-extension.ts

      - name: Buildear extensión de Firefox (extension-firefox/)
        run: node --disable-warning=ExperimentalWarning --experimental-strip-types scripts/build-extension.ts firefox

      # ---- 4. Empaquetar cada extensión (manifest.json en la raíz del archivo) ----
      - name: Empaquetar artefactos .zip
        id: zip
        run: |
          V="${{ steps.ver.outputs.version }}"
          mkdir -p release
          ( cd extension && zip -qr "../release/cosmos-pay-chrome-v${V}.zip" . )
          ( cd extension-firefox && zip -qr "../release/cosmos-pay-firefox-v${V}.zip" . )
          echo "Empaquetado:"; ls -lh release

      # ---- 5a. Solo en main: commitear el bump de vuelta + tag ----
      - name: Commitear bump de versión (main)
        if: github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.ver.outputs.version }} [skip ci]"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      # ---- 5b. En dev: taggear el commit actual (sin commit de bump, prerelease efímera) ----
      - name: Taggear prerelease (dev)
        if: github.ref_name == 'dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      # ---- 5c. Publicar el release con los .zip adjuntos ----
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Cosmos Pay v${{ steps.ver.outputs.version }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          fail_on_unmatched_files: true
          body: |
            Extensión empaquetada de Cosmos Pay **v${{ steps.ver.outputs.version }}**.

            **Cómo probar (carga sin firmar):**
            - **Chrome / Edge:** descargá `cosmos-pay-chrome-v${{ steps.ver.outputs.version }}.zip`, descomprimí, y en `chrome://extensions` → activá *Modo desarrollador* → *Cargar descomprimida* → elegí la carpeta.
            - **Firefox:** descargá `cosmos-pay-firefox-v${{ steps.ver.outputs.version }}.zip` y en `about:debugging` → *Este Firefox* → *Cargar complemento temporal* → elegí el `manifest.json` dentro del zip.

            El .zip también sirve para subirlo tal cual a la Chrome Web Store / Firefox AMO.
          files: |
            release/cosmos-pay-chrome-v${{ steps.ver.outputs.version }}.zip
            release/cosmos-pay-firefox-v${{ steps.ver.outputs.version }}.zip
